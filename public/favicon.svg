<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="50%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="48" fill="url(#bg)" stroke="url(#glow)" stroke-width="2"/>
  <circle cx="50" cy="50" r="35" fill="none" stroke="#06b6d4" stroke-width="0.5" opacity="0.3"/>
  <circle cx="50" cy="50" r="25" fill="none" stroke="#8b5cf6" stroke-width="0.5" opacity="0.3"/>
  <!-- Eye / Moon -->
  <ellipse cx="50" cy="45" rx="12" ry="10" fill="#8b5cf6" opacity="0.2"/>
  <ellipse cx="50" cy="45" rx="8" ry="7" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="50" cy="45" r="4" fill="#8b5cf6"/>
  <circle cx="50" cy="45" r="1.5" fill="#06b6d4"/>
  <!-- Face lines -->
  <path d="M 35 60 Q 50 70 65 60" fill="none" stroke="#8b5cf6" stroke-width="0.8" opacity="0.4"/>
  <!-- Stars -->
  <circle cx="30" cy="25" r="1" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="70" cy="30" r="1" fill="#06b6d4" opacity="0.8"/>
  <circle cx="25" cy="55" r="0.8" fill="#8b5cf6" opacity="0.6"/>
  <circle cx="75" cy="60" r="0.8" fill="#06b6d4" opacity="0.6"/>
</svg>
